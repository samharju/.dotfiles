# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

includes:
  submodules: ./submodules/taskfile.yml

tasks:
  default:
    desc: stow configs
    cmds:
      - stow --ignore=taskfile.yml -v 2 -R neovim term wm submodules

  terminfo:
    if: test ! -e ~/.terminfo/w/wezterm
    cmds:
      - figlet terminfo
      - curl -o ~/tempterminfo https://raw.githubusercontent.com/wez/wezterm/master/termwiz/data/wezterm.terminfo
      - tic -x -o ~/.terminfo ~/tempterminfo
      - rm ~/tempterminfo

  go:
    desc: install go
    vars:
      go_checksum: 5c2c3b16caefa1d968a94c1daca04a7ca301a496d9b086e17ad77bb81393f053
      go_version: 1.26.5
      go_pkg: go{{.go_version}}.linux-amd64.tar.gz
    if: '[[ ! "$(go version)" =~ "{{.go_version}}" ]]'
    cmds:
      - cmd: wget https://go.dev/dl/{{.go_pkg}}
        if: test ! -f {{.go_pkg}}
      - sha256sum -c <<< "{{.go_checksum}} {{.go_pkg}}"
      - sudo rm -rf /usr/local/go
      - sudo tar -C /usr/local -xzf {{.go_pkg}}
      - rm {{.go_pkg}}

  tools:
    cmds:
      - go install github.com/jesseduffield/lazygit@latest
      - go install github.com/go-task/task/v3/cmd/task@latest

  docker-gpg-ubuntu:
    if: "rg -q Ubuntu /etc/os-release"
    cmds:
      - sudo apt update
      - sudo apt install ca-certificates curl
      - sudo install -m 0755 -d /etc/apt/keyrings
      - sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      - sudo chmod a+r /etc/apt/keyrings/docker.asc

  docker-repo-ubuntu:
    if: "rg -q Ubuntu /etc/os-release"
    deps: [docker-gpg-ubuntu]
    cmds:
      - |
        sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
        Types: deb
        URIs: https://download.docker.com/linux/ubuntu
        Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
        Components: stable
        Architectures: $(dpkg --print-architecture)
        Signed-By: /etc/apt/keyrings/docker.asc
        EOF
      - sudo apt update

  docker-ubuntu:
    if: "rg -q Ubuntu /etc/os-release"
    deps: [docker-repo-ubuntu]
    cmds:
      - sudo apt remove $(dpkg --get-selections docker.io docker-compose docker-compose-v2 docker-doc podman-docker containerd runc | cut -f1)
      - sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      - sudo apt autoremove -y
      - sudo usermod -aG docker $USER
      - sudo systemctl enable docker
      - sudo systemctl start docker

  pipx:
    deps: [submodules:python3.13]
    if: test ! command -v pipx
    cmds:
      - python -m pip install --user pipx
      - pipx ensurepath

  ansible:
    deps: [pipx]
    if: test ! command -v ansible
    cmd: pipx install --include-deps ansible

  nvm:
    if: test ! command -v nvm
    cmds:
      - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash
      - nvm install stable
      - nvm use stable
