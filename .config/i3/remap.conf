# vim: ft=i3config

bindsym $mod+r					mode "resize"

mode "resize" {
        bindsym h				resize shrink width 50 px or 50 ppt
        bindsym j 				resize grow height 25 px or 25 ppt
        bindsym k 				resize shrink height 25 px or 25 ppt
        bindsym l 				resize grow width 50 px or 50 ppt
        bindsym Return			mode "default"
        bindsym Escape 			mode "default"
        bindsym $mod+r 			mode "default"
}

bindsym $mod+Control+e			exec "i3-nagbar -t warning -m 'You pressed the exit shortcut. Do you really want to exit i3? This will end your X session.' -B 'Yes, exit i3' 'i3-msg exit'"
bindsym $mod+Return				"exec i3-sensible-terminal; workspace number 2"
bindsym $mod+p					exec ~/.local/scripts/lockbad
bindsym $mod+o					exec ~/.local/scripts/lockscreen
bindsym $mod+Control+t			exec --no-startup-id $HOME/.local/scripts/cantseeshit2
bindsym $mod+u					exec --no-startup-id brightnessctl set +10%
bindsym $mod+i					exec --no-startup-id brightnessctl set 10%-
bindsym $mod+d					exec --no-startup-id dmenu_run -i -l 30 -b
bindsym XF86AudioMute			exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle
bindsym XF86AudioRaiseVolume	exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10%
bindsym XF86AudioLowerVolume	exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10%
bindsym XF86AudioMicMute		exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindsym Ctrl+Shift+s			exec --no-startup-id "sleep 0.3; fname=~/user/pictures/screenshots/$(date +%F__%T).png; scrot -s -f -F $fname ; xclip -selection clipboard -target image/png -f $fname"
bindsym $mod+c                  exec --no-startup-id "wezterm start --class cursor-pane watch -n 2 -t ~/.local/scripts/cursor-pane"
bindsym $mod+n					exec --no-startup-id "wezterm start nvim todos.md"
bindsym $mod+Shift+f			floating toggle
bindsym $mod+Down				focus down
bindsym $mod+Left				focus left
bindsym $mod+Right				focus right
bindsym $mod+Up					focus up
bindsym $mod+f					fullscreen toggle
bindsym $mod+Shift+q			kill
bindsym $mod+s					layout stacking
bindsym $mod+w					layout tabbed
bindsym $mod+e					layout toggle split
bindsym $mod+Shift+h			move container to workspace number $ws1
bindsym $mod+Shift+0			move container to workspace number $ws10
bindsym $mod+Shift+j			move container to workspace number $ws2
bindsym $mod+Shift+k			move container to workspace number $ws3
bindsym $mod+Shift+l			move container to workspace number $ws4
bindsym $mod+Shift+semicolon	move container to workspace number $ws5
bindsym $mod+Shift+6			move container to workspace number $ws6
bindsym $mod+Shift+7			move container to workspace number $ws7
bindsym $mod+Shift+8			move container to workspace number $ws8
bindsym $mod+Shift+9			move container to workspace number $ws9
bindsym $mod+Shift+Down			move down
bindsym $mod+Shift+Left			move left
bindsym $mod+Shift+Right		move right
bindsym $mod+Shift+Up			move up
bindsym $mod+Shift+p			move workspace to output left
bindsym $mod+Shift+n			move workspace to output right
bindsym $mod+Control+c			reload
bindsym $mod+Control+r			restart
bindsym $mod+b					split h
bindsym $mod+v					split v
bindsym $mod+h					workspace number $ws1
bindsym $mod+0					workspace number $ws10
bindsym $mod+j					workspace number $ws2
bindsym $mod+k					workspace number $ws3
bindsym $mod+l					workspace number $ws4
bindsym $mod+semicolon			workspace number $ws5
bindsym $mod+6					workspace number $ws6
bindsym $mod+7					workspace number $ws7
bindsym $mod+8					workspace number $ws8
bindsym $mod+9					workspace number $ws9
