; vim:ft=dosini
[colors]
black0 = #90000004
black1 = #000008
green = #4ba0a0
grey1 = #aaaabb
orange = #f7ae62
purple = #a0a0df
red = #ef626c
white = #dadada
yellow = #e1e17d

[bar/primary]
bottom = true
height = 24pt
monitor = ${env:MONITOR:}
radius = 6pt
width = 100%

background = ${colors.black0}
border-color = #00000000
border-size = 6pt
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = "HackNerdFont;size=10"
font-1 = "Symbols Nerd Font Mono;size=12"
foreground = ${colors.white}
line-size = 4pt
module-margin = 1
modules-left = workspaces
modules-right = bluetooth gitlab clocking pomodoro vpn filesystem cpu memory temperature battery pulseaudio date tray
padding-left = 
padding-right = 1
separator = "⋅"
separator-foreground = ${colors.purple}

[bar/secondary]
inherit = bar/primary

modules-left = workspaces
modules-right = usage date clankers

[module/battery]
type = internal/battery

format-charging-prefix = "BAT "
format-charging-prefix-foreground = ${colors.purple}
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.purple}
format-full-prefix = "BAT "
format-full-prefix-foreground = ${colors.purple}
full-at=97
time-format = %H:%M

[module/temperature]
type = internal/temperature

format-prefix = "TEMP "
format-prefix-foreground = ${colors.purple}
format-warn-prefix = "TEMP "
format-warn-prefix-foreground = ${colors.purple}
label = %temperature-c%
label-warn-foreground = ${colors.yellow}
units = false
warn-temperature = 80

[module/workspaces]
type = internal/xworkspaces

group-by-monitor = true
label-active = %name%
label-active-background = ${colors.black1}
label-active-padding = 1
label-active-underline= ${colors.purple}
label-empty = %name%
label-empty-foreground = ${colors.grey1}
label-empty-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.green}
label-urgent-padding = 1


[module/pulseaudio]
type = internal/pulseaudio

click-right = pavucontrol
format-volume = <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.purple}
label-muted = muted
label-muted-foreground = ${colors.grey1}
label-volume = %percentage%

[module/filesystem]
type = internal/fs

format-mounted-prefix = "DISK "
format-mounted-prefix-foreground = ${colors.purple}
label-mounted =  %percentage_used%

[module/memory]
type = internal/memory

format-prefix = "MEM "
format-prefix-foreground = ${colors.purple}
interval = 5
label = %percentage_used:2%

[module/cpu]
type = internal/cpu

format-prefix = "CPU "
format-prefix-foreground = ${colors.purple}
interval = 5
label = %percentage:2%

[module/vpn]
type = custom/script

exec = ~/.config/polybar/vpn
format = <label>
format-fail = <label-fail>
format-fail-foreground = ${colors.red}
format-foreground = ${colors.green}
format-prefix = "VPN "
format-prefix-foreground = ${colors.purple}
interval = 5

[module/usage]
type = custom/script

exec = ~/.config/polybar/usage2
format-prefix = "PCPU "
format-prefix-foreground = ${colors.purple}
interval = 7


[module/clankers]
type = custom/script

click-left = ~/.config/polybar/clanker-next
exec = ~/.config/polybar/clankers
format-prefix = "CLANKERS "
format-prefix-foreground = ${colors.purple}
format-fail = <label-fail>
format-fail-prefix = "CLANKERS "
format-fail-foreground = ${colors.red}
interval = 5

[module/clocking]
type = custom/script

exec = ~/user/code/clocking/clocking.py status
format-prefix = "WORK "
format-prefix-foreground = ${colors.purple}
interval = 10

[module/bluetooth]
type = custom/script

exec = ~/.config/polybar/bluetoothstatus
format-fail = 
format-foreground = ${colors.purple}
interval = 5

[module/pomodoro]
type = custom/script

exec = ~/.config/polybar/pomodoro
format-fail = <label-fail>
format-fail-foreground = ${colors.yellow}
format-prefix = "ERGO "
format-prefix-foreground = ${colors.purple}
interval = 1

[module/gitlab]
type = custom/script

exec = ~/.config/polybar/gitlab
format-fail =
format-foreground = ${colors.orange}
interval = 1

[network-base]
type = internal/network

format-connected = <label-connected>
format-disconnected = <label-disconnected>
interval = 5
label-disconnected = 

[module/wlan]
inherit = network-base

format-connected = <ramp-signal> <label-connected>
interface-type = wireless
interval = 5
label-connected = %essid% %downspeed%
ramp-signal-0 = %{F#ef626c}󰤯%{F-}
ramp-signal-1 = %{F#f7ae62}󰤠%{F-}
ramp-signal-2 = %{F#e1e17d}󰤟%{F-}
ramp-signal-3 = %{F#a0a0df}󰤢%{F-}
ramp-signal-4 = %{F#4ba0a0}󰤥%{F-}
ramp-signal-5 = %{F#4ba0a0}󰤨%{F-}

[module/eth]
inherit = network-base

interface-type = wired
label-connected = 󰈀 %downspeed%

[module/date]
type = internal/date

date-alt = %H:%M:%S %z
date= %d.%m. %H:%M:%S
format-prefix = "DAT "
format-prefix-foreground = ${colors.purple}
interval = 1
label = %date%

[module/tray]
type = internal/tray

format-prefix = "TRAY "
format-prefix-foreground = ${colors.purple}

[settings]
screenchange-reload = true
pseudo-transparency = false
